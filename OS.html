<!DOCTYPE html>
<html>
<head>
<title>CPU Scheduling Simulator</title>
<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg,#1f4037,#99f2c8);
        color: #fff;
        text-align: center;
        padding: 20px;
    }

    .container {
        background: rgba(0,0,0,0.7);
        padding: 25px;
        border-radius: 15px;
        width: 80%;
        margin: auto;
        box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }

    input, select, button {
        padding: 8px 12px;
        margin: 5px;
        border-radius: 8px;
        border: none;
        font-size: 14px;
    }

    button {
        background: #00c6ff;
        color: white;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #0072ff;
        transform: scale(1.05);
    }

    table {
        width: 100%;
        margin-top: 15px;
        border-collapse: collapse;
        background: #fff;
        color: #000;
        border-radius: 10px;
        overflow: hidden;
    }

    th {
        background: #0072ff;
        color: white;
    }

    th, td {
        padding: 10px;
        border: 1px solid #ccc;
    }

    .gantt-container {
        margin-top: 30px;
        padding: 20px;
        background: #fff;
        border-radius: 10px;
        color: black;
    }

    .gantt {
        display: flex;
        align-items: center;
    }

    .block {
        position: relative;
        padding: 20px;
        border-right: 2px solid black;
        text-align: center;
        font-weight: bold;
        background: #00c6ff;
        color: white;
        animation: fadeIn 0.5s ease-in-out;
    }

    .time {
        position: absolute;
        bottom: -20px;
        left: 0;
        font-size: 12px;
        color: black;
    }

    @keyframes fadeIn {
        from {opacity: 0; transform: translateY(-10px);}
        to {opacity: 1; transform: translateY(0);}
    }

    .result-box {
        margin-top: 20px;
        padding: 15px;
        background: #00c6ff;
        border-radius: 10px;
        font-weight: bold;
    }

</style>
</head>

<body>

<div class="container">
<h2>✨ CPU Scheduling Simulator</h2>

<input type="text" id="pid" placeholder="Process ID">
<input type="number" id="arrival" placeholder="Arrival Time">
<input type="number" id="burst" placeholder="Burst Time">
<button onclick="addProcess()">Add</button>

<br>

<select id="algorithm">
    <option value="FCFS">FCFS</option>
    <option value="SJF">SJF (Non-Preemptive)</option>
</select>

<button onclick="simulate()">Simulate</button>

<table id="processTable">
<tr><th>PID</th><th>Arrival</th><th>Burst</th></tr>
</table>

<div id="results"></div>

<div class="gantt-container">
<h3>📊 Gantt Chart</h3>
<div class="gantt" id="gantt"></div>
</div>

</div>

<script>
let processes = [];

function addProcess() {
    let pid = document.getElementById("pid").value;
    let arrival = parseInt(document.getElementById("arrival").value);
    let burst = parseInt(document.getElementById("burst").value);

    processes.push({pid, arrival, burst});

    let table = document.getElementById("processTable");
    let row = table.insertRow();
    row.innerHTML = `<td>${pid}</td><td>${arrival}</td><td>${burst}</td>`;
}

function simulate() {
    let algo = document.getElementById("algorithm").value;
    let gantt = document.getElementById("gantt");
    let results = document.getElementById("results");
    gantt.innerHTML = "";
    results.innerHTML = "";

    let time = 0;
    let totalWT = 0;
    let completed = [];
    let procCopy = JSON.parse(JSON.stringify(processes));

    while (procCopy.length > 0) {
        let available = procCopy.filter(p => p.arrival <= time);

        if (available.length === 0) {
            time++;
            continue;
        }

        let current;
        if (algo === "FCFS") {
            available.sort((a,b)=>a.arrival-b.arrival);
        } else {
            available.sort((a,b)=>a.burst-b.burst);
        }

        current = available[0];
        current.start = time;
        current.waiting = current.start - current.arrival;
        current.turnaround = current.waiting + current.burst;

        totalWT += current.waiting;
        time += current.burst;

        completed.push(current);
        procCopy = procCopy.filter(p => p.pid !== current.pid);
    }

    // Draw Gantt Chart
    let currentTime = 0;
    completed.forEach(p => {
        let block = document.createElement("div");
        block.className = "block";
        block.style.width = (p.burst * 40) + "px";
        block.innerHTML = p.pid + `<div class="time">${currentTime}</div>`;
        gantt.appendChild(block);
        currentTime += p.burst;
    });

    let endTime = document.createElement("div");
    endTime.innerHTML = currentTime;
    gantt.appendChild(endTime);

    // Display Results
    let html = "<table><tr><th>PID</th><th>Waiting Time</th><th>Turnaround Time</th></tr>";
    completed.forEach(p => {
        html += `<tr><td>${p.pid}</td><td>${p.waiting}</td><td>${p.turnaround}</td></tr>`;
    });
    html += "</table>";

    html += `<div class="result-box">Average Waiting Time = ${(totalWT/completed.length).toFixed(2)}</div>`;

    results.innerHTML = html;
}
</script>

</body>
</html>
